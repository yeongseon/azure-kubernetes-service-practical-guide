name: Bug Report
description: Report a reproducible problem with the documentation site, examples, or repository tooling.
title: "[Bug]: "
labels: []
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Provide a short summary of the problem.
      placeholder: The docs page or sample behaves differently than expected.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe what happened, what you expected, and how to reproduce it.
      placeholder: |
        Page or file:
        Steps to reproduce:
        Expected result:
        Actual result:
    validations:
      required: true
