name: Feature or Content Request
description: Request a new tutorial, playbook, reference page, or repository improvement.
title: "[Request]: "
labels: []
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Provide a short summary of the request.
      placeholder: Add a new guide, sample, or troubleshooting topic.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Explain the request, target audience, and the problem it would solve.
      placeholder: |
        Requested content or feature:
        Who would use it:
        Why it is needed:
        Useful references or examples:
    validations:
      required: true
