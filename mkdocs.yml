site_name: Azure Kubernetes Service Practical Guide
site_url: https://yeongseon.github.io/azure-kubernetes-service-practical-guide/
site_description: Comprehensive guide for running containerized applications on Azure Kubernetes Service (AKS)
site_author: yeongseon

repo_name: yeongseon/azure-kubernetes-service-practical-guide
repo_url: https://github.com/yeongseon/azure-kubernetes-service-practical-guide

theme:
  name: material
  language: en
  favicon: assets/images/favicon.svg
  logo: assets/images/favicon.svg
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  custom_dir: docs

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-zoom.js

plugins:
  - search
  - macros:
      modules: ['azure_guide_capture_toolkit.mkdocs_macros']
      j2_variable_start_string: "[[["
      j2_variable_end_string: "]]]"
      j2_block_start_string: "[[%"
      j2_block_end_string: "%]]"
      j2_comment_start_string: "[[#"
      j2_comment_end_string: "#]]"
      on_error_fail: true
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

not_in_nav: |
  /troubleshooting/playbooks/*.md
  /troubleshooting/playbooks/*/*.md
  /troubleshooting/kql/*/*.md
  /meta/content-model.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/azure-kubernetes-service-practical-guide

