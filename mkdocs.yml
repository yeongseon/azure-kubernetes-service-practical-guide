site_name: Azure AKS Practical Guide
site_url: https://yeongseon.github.io/azure-aks-practical-guide/
site_description: Comprehensive guide for running containerized applications on Azure Kubernetes Service (AKS)
site_author: yeongseon

repo_name: yeongseon/azure-aks-practical-guide
repo_url: https://github.com/yeongseon/azure-aks-practical-guide

theme:
  name: material
  language: en
  favicon: assets/images/favicon.svg
  logo: assets/images/favicon.svg
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  custom_dir: docs

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid-zoom.js

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/azure-aks-practical-guide

nav:
  - Home: index.md
  - Start Here:
    - start-here/index.md
  - Platform:
    - platform/index.md
  - Best Practices:
    - best-practices/index.md
  - Operations:
    - operations/index.md
  - Troubleshooting:
    - troubleshooting/index.md
