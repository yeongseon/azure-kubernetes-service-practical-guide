apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-lab
  namespace: workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-lab
  template:
    metadata:
      labels:
        app: crashloop-lab
    spec:
      containers:
        - name: app
          image: "${LAB_IMAGE}"
          command:
            - /bin/sh
            - -c
            - python -c 'import sys; sys.exit(1)'
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
