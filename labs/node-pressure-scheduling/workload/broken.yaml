apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-scheduling-lab
  namespace: workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-scheduling-lab
  template:
    metadata:
      labels:
        app: node-scheduling-lab
    spec:
      nodeSelector:
        kubernetes.azure.com/mode: system
      containers:
        - name: app
          image: "${LAB_IMAGE}"
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
